packages:
  - packages/*

# Temporarily relaxed: recently-released deps (e.g. vitest 4.1.8) tripped the
# strict gate and blocked CI/preview. Keep the age advisory (non-strict) for now;
# restore `minimumReleaseAgeStrict: true` once the pinned deps age past the window.
minimumReleaseAge: 10080
minimumReleaseAgeStrict: false

allowBuilds:
  esbuild: true
  lefthook: true
