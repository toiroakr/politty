name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch, so checks (including the macOS
  # shell-completion job) cover stacked / feature-branch PRs too, not only
  # main-targeting ones.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          standalone: true
          run_install: false
      - name: Install Node.js
        run: pnpm env use --global 24
        shell: bash
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash
      - name: Typecheck, lint, format, and knip
        shell: bash
        run: |
          pnpm typecheck &
          TYPECHECK_PID=$!
          pnpm lint &
          LINT_PID=$!
          pnpm format:check &
          FORMAT_PID=$!
          pnpm knip &
          KNIP_PID=$!
          FAIL=0
          for pid in "$TYPECHECK_PID" "$LINT_PID" "$FORMAT_PID" "$KNIP_PID"; do
            wait "$pid" || FAIL=1
          done
          exit $FAIL
      - name: Test with coverage
        shell: bash
        run: npx vitest run --coverage --project unit
      - name: Run octocov
        # octocov is Linux-only and uploads coverage once; skip on Windows.
        if: matrix.os == 'ubuntu-latest'
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  shell-completion:
    name: Shell Completion (${{ matrix.os }} / ${{ matrix.shell }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            install: expect
          - os: ubuntu-latest
            shell: zsh
            install: zsh
          - os: ubuntu-latest
            shell: fish
            install: fish
          # macOS uses BSD userland (head/grep/stat) and a different fork/PTY
          # profile; the runtime dispatcher zsh completion regresses there even
          # though Linux passes. zsh ships on macOS runners, so no install step.
          - os: macos-latest
            shell: zsh
    steps:
      - name: Install shell tools
        if: matrix.install && runner.os == 'Linux'
        run: |
          sudo apt-get install -y --no-install-recommends ${{ matrix.install }} \
            || (echo "apt-get install failed; updating package lists and retrying." \
                && sudo apt-get update -o Acquire::http::Timeout=10 -o Acquire::Retries=3 \
                && sudo apt-get install -o Acquire::http::Timeout=10 -o Acquire::Retries=3 -y --no-install-recommends ${{ matrix.install }})
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          standalone: true
          run_install: false
      - name: Install Node.js
        run: pnpm env use --global 24
        shell: bash
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run shell completion tests
        run: npx vitest run --project shell-${{ matrix.shell }}
